name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Install dependencies
        run: npm install

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Pin Gradle to 7.6.3
        run: |
          python3 - << 'PYEOF'
          content = (
              "distributionBase=GRADLE_USER_HOME\n"
              "distributionPath=wrapper/dists\n"
              r"distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.3-all.zip" + "\n"
              "zipStoreBase=GRADLE_USER_HOME\n"
              "zipStorePath=wrapper/dists\n"
          )
          path = "android/gradle/wrapper/gradle-wrapper.properties"
          with open(path, "w", newline="\n") as f:
              f.write(content)
          with open(path, "r") as f:
              written = f.read()
          assert "gradle-7.6.3" in written
          print("Gradle pinned to 7.6.3 ✓")
          print(written)
          PYEOF

      - name: Bundle JavaScript into APK
        run: |
          mkdir -p android/app/src/main/assets
          export EXPO_ROUTER_APP_ROOT="$(pwd)/app"
          echo "EXPO_ROUTER_APP_ROOT=$EXPO_ROUTER_APP_ROOT"

          npx expo export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false

          ls -lh android/app/src/main/assets/index.android.bundle
          echo "Bundle created ✓"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClearSnap-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

