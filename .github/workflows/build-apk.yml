name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Install dependencies
        run: npm install

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Pin Gradle to 7.6.3 using Python
        run: |
          python3 - << 'PYEOF'
          import os

          content = (
              "distributionBase=GRADLE_USER_HOME\n"
              "distributionPath=wrapper/dists\n"
              r"distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.3-all.zip" + "\n"
              "zipStoreBase=GRADLE_USER_HOME\n"
              "zipStorePath=wrapper/dists\n"
          )

          path = "android/gradle/wrapper/gradle-wrapper.properties"
          os.makedirs(os.path.dirname(path), exist_ok=True)
          with open(path, "w", newline="\n") as f:
              f.write(content)

          # Read back and verify
          with open(path, "r") as f:
              written = f.read()

          print("=== gradle-wrapper.properties ===")
          print(repr(written))
          print(written)

          assert "gradle-7.6.3" in written, "FAILED: gradle-7.6.3 not found in file"
          assert not any(line[0] == ' ' for line in written.splitlines() if line), "FAILED: leading spaces found"
          print("Verification passed ✓")
          PYEOF

      - name: Verify Gradle version
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --version

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClearSnap-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
