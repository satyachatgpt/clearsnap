name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Fix Expo Gradle plugin path in settings.gradle
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const expoPath = path.dirname(require.resolve('expo/package.json'));
            const settingsFile = 'android/settings.gradle';
            let content = fs.readFileSync(settingsFile, 'utf8');
            console.log('--- Current settings.gradle ---');
            console.log(content);
            if (!content.includes('includeBuild')) {
              const patch = 'pluginManagement { includeBuild(\"' + expoPath + '\") }\n';
              content = patch + content;
              fs.writeFileSync(settingsFile, content);
              console.log('--- Patched settings.gradle ---');
              console.log(content);
            } else {
              console.log('includeBuild already present — no patch needed');
            }
          "

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClearSnap-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
