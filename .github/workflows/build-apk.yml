name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Fix android/build.gradle
        run: |
          python3 - << 'PYEOF'
          import re

          path = "android/build.gradle"
          with open(path, "r") as f:
              content = f.read()

          print("=== BEFORE ===")
          print(content)

          # Remove sourceCompatibility and targetCompatibility lines — they conflict
          # with the Java toolchain block that expo prebuild also generates
          content = re.sub(r'[ \t]*sourceCompatibility\s*=\s*JavaVersion\.[^\n]+\n', '', content)
          content = re.sub(r'[ \t]*targetCompatibility\s*=\s*JavaVersion\.[^\n]+\n', '', content)

          with open(path, "w") as f:
              f.write(content)

          print("=== AFTER ===")
          print(content)
          PYEOF

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClearSnap-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
